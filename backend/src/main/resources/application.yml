server:
  port: 9090
  servlet:
    encoding:
      charset: UTF-8
      force: true

spring:
  application:
    name: scholarship
  datasource:
    url: jdbc:h2:file:./data/scholarship;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2
      settings:
        web-allow-others: false
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
      data-locations: classpath:db/data.sql
      continue-on-error: false
      encoding: UTF-8
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 30MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    db-config:
      id-type: auto

app:
  jwt:
    secret: zjsu-scholarship-secret-key-2026-please-change-in-production-zjsu
    expire-hours: 24
  upload-dir: ./uploads

logging:
  level:
    com.zjsu.scholarship: INFO
    org.springframework: WARN
